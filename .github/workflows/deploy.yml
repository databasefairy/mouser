# Build (and optionally deploy) with GEMINI_API_KEY from GitHub secret.
# The app reads the key from the environment; here we inject it from Secrets.
# For Vercel: set GEMINI_API_KEY or GOOGLE_API_KEY in Vercel → Settings → Environment Variables.

name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build
